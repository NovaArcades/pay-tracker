<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Pay Tracker with Live Timer</title>
    <style>
        :root {
            --primary: #3182ce;
            --primary-hover: #2b6cb0;
            --success: #38a169;
            --success-hover: #2f855a;
            --danger: #e53e3e;
            --danger-hover: #c53030;
            --warning: #dd6b20;
            --background: #f7fafc;
            --card-bg: #ffffff;
            --text-main: #2d3748;
            --text-muted: #718096;
            --border: #e2e8f0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--background);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .app-container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 420px;
        }

        h2 { text-align: center; margin-top: 0; font-size: 24px; color: var(--text-main); }
        
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
            background: #f8fafc;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .stat-box { text-align: center; }
        .stat-box:first-child { border-right: 1px solid var(--border); }
        .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 4px; }
        .stat-value { font-size: 22px; font-weight: 700; color: var(--text-main); }

        /* Timer Section Stylings */
        .timer-card {
            background: #edf2f7;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px dashed #cbd5e0;
        }
        .timer-display {
            font-family: monospace;
            font-size: 36px;
            font-weight: bold;
            color: var(--text-main);
            margin: 10px 0;
        }
        .live-earnings {
            font-size: 14px;
            color: var(--success-hover);
            font-weight: 600;
            margin-bottom: 15px;
        }
        
        .input-row { display: flex; gap: 12px; margin-bottom: 15px; }
        .input-group { flex: 1; }
        label { display: block; font-size: 13px; font-weight: 500; color: var(--text-muted); margin-bottom: 6px; }
        
        input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            background: #fff;
        }
        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(49, 130, 206, 0.15); }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-timer-start { background: var(--primary); color: white; }
        .btn-timer-start:hover { background: var(--primary-hover); }
        .btn-timer-stop { background: var(--warning); color: white; }
        .btn-timer-stop:hover { background: #c05621; }
        .btn-add { background: var(--success); color: white; }
        .btn-add:hover { background: var(--success-hover); }
        
        .history-section { margin-top: 25px; }
        .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 2px solid var(--border); padding-bottom: 8px; }
        .history-title { font-size: 14px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }
        .btn-clear-all { background: none; color: var(--danger); font-size: 12px; width: auto; padding: 0; margin: 0; font-weight: 500; }
        .btn-clear-all:hover { color: var(--danger-hover); text-decoration: underline; }

        .history-list { max-height: 180px; overflow-y: auto; padding-right: 5px; list-style: none; padding-left: 0; margin: 0; }
        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 6px;
            margin-bottom: 8px;
            font-size: 14px;
            animation: fadeIn 0.3s ease;
        }
        .item-details { display: flex; flex-direction: column; }
        .item-date { font-size: 11px; color: var(--text-muted); }
        .btn-delete-item { background: none; color: var(--text-muted); width: auto; padding: 4px 8px; font-size: 14px; border-radius: 4px; }
        .btn-delete-item:hover { color: var(--danger); background: #fff5f5; }

        .empty-state { text-align: center; color: var(--text-muted); font-size: 14px; padding: 20px 0; font-style: italic; }

        .divider {
            text-align: center;
            color: var(--text-muted);
            font-size: 12px;
            margin: 20px 0;
            position: relative;
        }
        .divider::before, .divider::after {
            content: "";
            position: absolute;
            top: 50%;
            width: 35%;
            height: 1px;
            background: var(--border);
        }
        .divider::before { left: 0; }
        .divider::after { right: 0; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="app-container">
    <h2>Shift & Pay Tracker</h2>
    
    <!-- Overall Dashboard Stats -->
    <div class="dashboard-grid">
        <div class="stat-box">
            <div class="stat-label">Total Time</div>
            <div class="stat-value" id="total-time">0h 0m 0s</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Total Earnings</div>
            <div class="stat-value" style="color: var(--primary)" id="total-pay">£0.00</div>
        </div>
    </div>
    
    <!-- Configuration -->
    <div class="input-row">
        <div class="input-group">
            <label for="rate">Hourly Rate (£)</label>
            <input type="number" id="rate" value="8.00" min="0" step="0.50" onchange="updateDashboard()">
        </div>
    </div>

    <!-- Active Timer Card -->
    <div class="timer-card">
        <div class="stat-label">Live Shift Timer</div>
        <div class="timer-display" id="timer-clock">00:00:00</div>
        <div class="live-earnings" id="live-earnings-display">Current session: £0.00</div>
        <button id="timer-btn" class="btn-timer-start" onclick="toggleTimer()">Start Shift</button>
    </div>

    <div class="divider">OR ADD MANUALLY</div>

    <!-- Manual input row -->
    <div class="input-row">
        <div class="input-group">
            <label for="add-hours">Hours</label>
            <input type="number" id="add-hours" value="0" min="0">
        </div>
        <div class="input-group">
            <label for="add-minutes">Minutes</label>
            <input type="number" id="add-minutes" value="0" min="0" max="59">
        </div>
    </div>
    
    <button class="btn-add" onclick="addManualShift()">Log Manual Time</button>

    <!-- Shift Records -->
    <div class="history-section">
        <div class="history-header">
            <div class="history-title">Shift History</div>
            <button class="btn-clear-all" onclick="resetAll()">Reset All</button>
        </div>
        <ul class="history-list" id="history-list">
            <!-- Injected by JavaScript -->
        </ul>
    </div>
</div>

<script>
    // Load existing items or initialize an empty array
    let shifts = JSON.parse(localStorage.getItem('shiftLogsSecs')) || [];
    
    // Set custom rate on load if it exists
    if(localStorage.getItem('hourlyRate')) {
        document.getElementById('rate').value = localStorage.getItem('hourlyRate');
    }

    // Timer state variables
    let timerInterval = null;
    let timerSeconds = 0;
    let isTimerRunning = false;

    window.onload = updateDashboard;

    // --- STOPWATCH LOGIC ---
    function toggleTimer() {
        const btn = document.getElementById('timer-btn');
        const rate = parseFloat(document.getElementById('rate').value) || 0;

        if (!isTimerRunning) {
            // Start the timer
            isTimerRunning = true;
            btn.innerText = "End & Log Shift";
            btn.className = "btn-timer-stop";
            
            let startTime = Date.now() - (timerSeconds * 1000);
            timerInterval = setInterval(() => {
                timerSeconds = Math.floor((Date.now() - startTime) / 1000);
                updateTimerDisplay(rate);
            }, 1000);
        } else {
            // Stop, log the shift, and reset timer state
            clearInterval(timerInterval);
            isTimerRunning = false;
            btn.innerText = "Start Shift";
            btn.className = "btn-timer-start";

            if (timerSeconds > 0) {
                logShiftSeconds(timerSeconds);
            }
            
            // Reset timer values
            timerSeconds = 0;
            document.getElementById('timer-clock').innerText = "00:00:00";
            document.getElementById('live-earnings-display').innerText = "Current session: £0.00";
        }
    }

    function updateTimerDisplay(rate) {
        let hrs = Math.floor(timerSeconds / 3600);
        let mins = Math.floor((timerSeconds % 3600) / 60);
        let secs = timerSeconds % 60;

        // Pad numbers to look like 02:05:09
        let fHours = String(hrs).padStart(2, '0');
        let fMins = String(mins).padStart(2, '0');
        let fSecs = String(secs).padStart(2, '0');

        document.getElementById('timer-clock').innerText = `${fHours}:${fMins}:${fSecs}`;

        // Live calculation of earned pay
        let earned = (timerSeconds / 3600) * rate;
        document.getElementById('live-earnings-display').innerText = `Current session: £${earned.toFixed(2)}`;
    }

    function logShiftSeconds(totalSeconds) {
        let h = Math.floor(totalSeconds / 3600);
        let m = Math.floor((totalSeconds % 3600) / 60);
        let s = totalSeconds % 60;

        let newShift = {
            id: Date.now(),
            hours: h,
            minutes: m,
            seconds: s,
            totalSecs: totalSeconds,
            date: new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'short', hour: '2-digit', minute:'2-digit' })
        };

        shifts.push(newShift);
        saveToStorage();
        updateDashboard();
    }

    // --- MANUAL SHIFT LOGIC ---
    function addManualShift() {
        let hInput = document.getElementById('add-hours');
        let mInput = document.getElementById('add-minutes');
        
        let h = parseInt(hInput.value) || 0;
        let m = parseInt(mInput.value) || 0;
        
        if (h === 0 && m === 0) return;

        let totalSeconds = (h * 3600) + (m * 60);
        logShiftSeconds(totalSeconds);
        
        hInput.value = 0;
        mInput.value = 0;
    }

    function deleteShift(id) {
        shifts = shifts.filter(shift => shift.id !== id);
        saveToStorage();
        updateDashboard();
    }

    function saveToStorage() {
        localStorage.setItem('shiftLogsSecs', JSON.stringify(shifts));
        localStorage.setItem('hourlyRate', document.getElementById('rate').value);
    }

    function updateDashboard() {
        let listContainer = document.getElementById('history-list');
        listContainer.innerHTML = '';
        
        let accumulatedSeconds = 0;
        let currentRate = parseFloat(document.getElementById('rate').value) || 0;
        localStorage.setItem('hourlyRate', currentRate);

        if (shifts.length === 0) {
            listContainer.innerHTML = '<li class="empty-state">No shifts logged yet.</li>';
        } else {
            shifts.forEach(shift => {
                accumulatedSeconds += shift.totalSecs;
                
                let li = document.createElement('li');
                li.className = 'history-item';
                
                // Show seconds in history only if they exist
                let timeString = `${shift.hours}h ${shift.minutes}m`;
                if(shift.seconds > 0) timeString += ` ${shift.seconds}s`;

                li.innerHTML = `
                    <div class="item-details">
                        <strong>+ ${timeString}</strong>
                        <span class="item-date">${shift.date}</span>
                    </div>
                    <button class="btn-delete-item" onclick="deleteShift(${shift.id})">✕</button>
                `;
                listContainer.appendChild(li);
            });
        }

        // Calculate final accumulated totals
        let displayHours = Math.floor(accumulatedSeconds / 3600);
        let displayMins = Math.floor((accumulatedSeconds % 3600) / 60);
        let displaySecs = accumulatedSeconds % 60;
        let displayPay = (accumulatedSeconds / 3600) * currentRate;

        document.getElementById('total-time').innerText = `${displayHours}h ${displayMins}m ${displaySecs}s`;
        document.getElementById('total-pay').innerText = `£${displayPay.toFixed(2)}`;
    }

    function resetAll() {
        if(confirm("Are you sure you want to permanently delete all shift history?")) {
            shifts = [];
            saveToStorage();
            updateDashboard();
        }
    }
</script>

</body>
</html>
