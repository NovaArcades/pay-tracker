<body class="spark-widget-shell">

<script>
const { state } = WH.createApp({
    title: "Shift Earnings Tracker & Stopwatch",
    params: {
        hourlyRate: { type: "number", value: 8.00, min: 0, max: 500, label: "Hourly Rate (£)" },
        hours: { type: "number", value: 0, min: 0, max: 24, label: "Hours (Manual Add)" },
        minutes: { type: "number", value: 0, min: 0, max: 59, label: "Minutes (Manual Add)" },
        logShift: { 
            type: "button", 
            label: "Log Manual Shift", 
            onClick: (s) => {
                const durationSeconds = (s.hours * 3600) + (s.minutes * 60);
                if (durationSeconds <= 0) return;
                
                logNewShift(durationSeconds, s.hourlyRate);
                s.hours = 0;
                s.minutes = 0;
            }
        },
        toggleTimer: {
            type: "button",
            label: "Start / Pause Shift Timer",
            onClick: (s) => {
                if (!s.timerActive) {
                    s.timerActive = true;
                    s.timerStartTime = Date.now() - (s.timerElapsedSeconds * 1000);
                    startTimerTicker();
                } else {
                    s.timerActive = false;
                    stopTimerTicker();
                }
            }
        },
        logTimerShift: {
            type: "button",
            label: "End & Log Active Timer",
            onClick: (s) => {
                if (s.timerElapsedSeconds <= 0) return;
                
                logNewShift(s.timerElapsedSeconds, s.hourlyRate);
                s.timerActive = false;
                s.timerElapsedSeconds = 0;
                s.timerStartTime = null;
                stopTimerTicker();
            }
        },
        reset: { 
            type: "button", 
            label: "Reset All History", 
            onClick: (s) => {
                s.shiftLog = [];
                s.hours = 0;
                s.minutes = 0;
                s.timerActive = false;
                s.timerElapsedSeconds = 0;
                s.timerStartTime = null;
                stopTimerTicker();
            }
        }
    },
    internal_state: {
        shiftLog: [],
        totalSeconds: 0,
        timerActive: false,
        timerStartTime: null,
        timerElapsedSeconds: 0
    },
    sizing: { viz: { height: 350 } },
    editorial: {
        hud: [
            { label: "Total Earnings", value: "£0.00" },
            { label: "Total Duration", value: "0h 0m 0s" }
        ]
    }
});

const [vTop, vBottom] = ui.buildStack([
    { id: 'summary', height: 130 },
    { id: 'history', height: 220 }
]);

/**
 * Formats seconds into standard Hh Mm Ss layout
 */
const formatDuration = (totalSeconds) => {
    const h = Math.floor(totalSeconds / 3600);
    const m = Math.floor((totalSeconds % 3600) / 60);
    const s = totalSeconds % 60;
    return `${h}h ${m}m ${s}s`;
};

/**
 * Common logging method to push exact duration entries
 */
const logNewShift = (durationSecs, rate) => {
    const newEntry = {
        id: Date.now(),
        timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' }),
        duration: durationSecs,
        rate: rate,
        earnings: (durationSecs / 3600) * rate
    };
    state.shiftLog = [...(state.shiftLog || []), newEntry];
};

/**
 * Ticker runner for our high precision stopwatch
 */
let liveTickerInterval = null;

const startTimerTicker = () => {
    if (liveTickerInterval) clearInterval(liveTickerInterval);
    liveTickerInterval = setInterval(() => {
        if (state.timerActive && state.timerStartTime) {
            state.timerElapsedSeconds = Math.floor((Date.now() - state.timerStartTime) / 1000);
        }
    }, 250);
};

const stopTimerTicker = () => {
    if (liveTickerInterval) {
        clearInterval(liveTickerInterval);
        liveTickerInterval = null;
    }
};

const updateAll = () => {
    const log = state.shiftLog || [];
    const totalSecs = log.reduce((acc, curr) => acc + curr.duration, 0);
    const totalEarned = log.reduce((acc, curr) => acc + curr.earnings, 0);

    state.totalSeconds = totalSecs;
    
    ui.setEditorial({
        hud: [
            { label: "Total Earnings", value: `£${totalEarned.toFixed(2)}` },
            { label: "Total Duration", value: formatDuration(totalSecs) }
        ]
    });
};

WH.initTable(vBottom, ({ state }) => ({
    data: [...(state.shiftLog || [])].reverse(), // Display newest logged shifts first
    columns: [
        { key: 'timestamp', label: 'Time Logged' },
        { 
            key: 'duration', 
            label: 'Duration Clocked', 
            format: (v) => formatDuration(v) 
        },
        { 
            key: 'earnings', 
            label: 'Earnings Earned', 
            format: (v) => `£${v.toFixed(2)}` 
        },
        {
            key: 'id',
            label: 'Action',
            format: () => '✕ Wipe'
        }
    ],
    onRowClick: (row) => {
        state.shiftLog = state.shiftLog.filter(item => item.id !== row.id);
    }
}));

WH.initCanvas(vTop, ({ ctx, width, height, state }) => {
    ctx.clearRect(0, 0, width, height);
    
    // Smooth rounded outer background panel card
    ctx.fillStyle = WH.getColor('--surface-container-highest');
    ctx.roundRect(10, 10, width - 20, height - 20, 12);
    ctx.fill();

    const isTimerMode = state.timerActive || state.timerElapsedSeconds > 0;

    if (!isTimerMode) {
        // --- Mode A: Default Aggregate View ---
        const log = state.shiftLog || [];
        const count = log.length;

        ctx.fillStyle = WH.getColor('--on-surface-default');
        ctx.font = '600 16px sans-serif';
        ctx.fillText('Shift Statistics Summary', 25, 40);
        
        ctx.font = '400 14px sans-serif';
        ctx.fillStyle = WH.getColor('--on-surface-de-emphasis');
        ctx.fillText(`Logged Shifts: ${count}`, 25, 65);
        ctx.fillText(`Active Wage Rate: £${state.hourlyRate.toFixed(2)} / hour`, 25, 85);
        
        if (count === 0) {
            ctx.textAlign = 'center';
            ctx.fillStyle = WH.getColor('--on-surface-de-emphasis');
            ctx.fillText('No logged sessions. Toggle the shift timer below!', width / 2, height - 30);
        } else {
            // Visual indicators for accumulated activity progress
            ctx.textAlign = 'left';
            ctx.font = '500 12px sans-serif';
            ctx.fillText('Accumulated Shift Work Volume:', 25, 115);

            const barWidth = width - 50;
            const barY = height - 25;
            ctx.fillStyle = WH.getColor('--outline-variant');
            ctx.fillRect(25, barY, barWidth, 10);
            
            // Map total duration progress to an arbitrary 8-hour shift target line
            const activeWidth = Math.min(barWidth, (state.totalSeconds / 28800) * barWidth);
            ctx.fillStyle = WH.getColor('--primary');
            ctx.fillRect(25, barY, activeWidth, 10);
        }
    } else {
        // --- Mode B: Glowing Live Stopwatch Dashboard ---
        const totalSecs = state.timerElapsedSeconds || 0;
        const liveEarned = (totalSecs / 3600) * state.hourlyRate;
        
        // Draw Stopwatch representation on Left Side
        const circleX = 75;
        const circleY = height / 2;
        const circleRad = 35;
        
        // Outer Stopwatch Bezel
        ctx.strokeStyle = WH.getColor('--outline-variant');
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.arc(circleX, circleY, circleRad, 0, Math.PI * 2);
        ctx.stroke();

        // Pulsing dynamic light indicating active recording
        if (state.timerActive) {
            ctx.fillStyle = WH.getColor('--error');
            const pulseSize = 4 + Math.sin(Date.now() / 200) * 1.5;
            ctx.beginPath();
            ctx.arc(circleX, circleY - circleRad, pulseSize, 0, Math.PI * 2);
            ctx.fill();
        }

        // Clock sweep hands showing moving seconds
        ctx.strokeStyle = state.timerActive ? WH.getColor('--primary') : WH.getColor('--on-surface-de-emphasis');
        ctx.lineWidth = 2.5;
        ctx.lineCap = 'round';
        const angle = ((totalSecs % 60) / 60) * Math.PI * 2 - Math.PI / 2;
        ctx.beginPath();
        ctx.moveTo(circleX, circleY);
        ctx.lineTo(circleX + Math.cos(angle) * (circleRad - 8), circleY + Math.sin(angle) * (circleRad - 8));
        ctx.stroke();

        // Render Stopwatch digital readings and real-time wages
        ctx.textAlign = 'left';
        ctx.fillStyle = WH.getColor('--on-surface-default');
        ctx.font = '600 14px sans-serif';
        ctx.fillText(state.timerActive ? 'Active Shift Timer Ticking...' : 'Shift Timer Paused', 135, 40);

        ctx.font = 'bold 24px monospace';
        const formattedLiveStopwatch = formatDuration(totalSecs);
        ctx.fillText(formattedLiveStopwatch, 135, 75);

        ctx.font = '500 14px sans-serif';
        ctx.fillStyle = WH.getColor('--success');
        ctx.fillText(`Live Earned: £${liveEarned.toFixed(3)}`, 135, 105);
    }
});

// Keep calculations updated dynamically
state._subscribe('shiftLog', updateAll);
state._subscribe('hourlyRate', updateAll);

// Handle page resets / resume timers
state._subscribe('timerActive', (active) => {
    if (active) {
        startTimerTicker();
    } else {
        stopTimerTicker();
    }
});

// Perform Initial run-time boot checks
updateAll();
if (state.timerActive) {
    startTimerTicker();
}
</script>
